site_name: 久违的事
site_url: https://stubbornleaf.github.io/jiuweideshi-songbook/
theme:
  name: material
  language: zh
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - toc.integrate
    - content.code.copy

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.details

nav:
  - 首页: index.md
  - 序言: prologue.md
  - 曲目:
      - 01 久违的事: songs/久违的事.md
      - 02 郭源潮 : songs/郭源潮.md
      - 03 莉莉安 : songs/莉莉安.md
      - 04 春风十里 : songs/春风十里.md
      - 05 夏日限定 : songs/夏日限定.md
      - 06 山阴路的夏天 : songs/山阴路的夏天.md
      - 07 模范情书 : songs/模范情书.md
      - 08 恋恋风尘 : songs/恋恋风尘.md
      - 09 One More Cup of Coffee : songs/One More Cup of Coffee.md
      - 10 乌云典当记 : songs/乌云典当记.md
      - 11 在劫难逃 : songs/在劫难逃.md
      - 12 关于郑州的记忆 : songs/关于郑州的记忆.md
      - 13 忽然 : songs/忽然.md
      - 14 安和桥 : songs/安和桥.md
      - 15 我从这里走过 : songs/我从这里走过.md
      - 16 路过人间 : songs/路过人间.md
      - 17 想把我唱给你听 : songs/想把我唱给你听.md
      - 18 
      - 19 米店 : songs/米店.md
  - 演职人员: credits.md

extra_css:
  - stylesheets/extra.css
